<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZeroLimit</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #606F77;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #606F77;
        z-index: 9999;
        transition: opacity 150ms ease;
      }
      #splash.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true"></div>
    <script type="module" src="/src/main.tsx"></script>
